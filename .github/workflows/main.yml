name: CI/CD for tq_bot

on:
  release:
    types: [created]
    branches:
      - main
      - dev

jobs:
  tq_bot-push:
    name: Pushing tq_bot images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/tq_bot
          tags: |
            type=ref,event=tag,enable=true

      - name: timetable build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.tq_bot
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          
  ssh_deliver:
    name: Deliver the images via SSH
    runs-on: ubuntu-latest
    needs:
      - tq_bot-push
    steps:
      - name: SSH Deliver
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: github-actions
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ "$GITHUB_REF_NAME" = "main" ]; then
              cd /root/docker-compose-prod
            else
              cd /root/docker-compose-test
            fi
            docker-compose down
            echo "${{ secrets.DOCKER_PASSWORD }}" > /tmp/passwd.txt
            cat /tmp/passwd.txt | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            rm /tmp/passwd.txt
            docker pull ${{ secrets.DOCKER_USERNAME }}/tq_bot:latest
            if [ "$GITHUB_REF_NAME" = "main" ]; then
              cd /root/docker-compose-prod
            else
              cd /root/docker-compose-test
            fi
            docker-compose up -d && docker-compose down && docker-compose up -d
            docker-compose down && docker-compose up -d